# ── Analytics ──────────────────────────────────────────────────────────────
analytics:
  # Lead-time cohort floors: order-year groups produce clustered lead times.
  # Subtracting these floors yields the 0-11 day efficiency signal.
  cluster_floors: [904, 1269, 1634]
  # Boundaries used in np.select conditions (< 1100 → floor[0], 1100-1499 → floor[1], ≥1500 → floor[2])
  cluster_boundaries: [1100, 1500]
  # Default number of orders shown in the Gantt timeline chart
  timeline_default_n: 50

# ── UI / Charts ────────────────────────────────────────────────────────────
ui:
  page_title: "Nassau Candy – Route Efficiency"
  page_icon: "🍭"
  app_title: "Factory-to-Customer Shipping Route Efficiency"
  app_caption: "Nassau Candy Distributor · Logistics Analytics Dashboard"

  ship_mode_order:
